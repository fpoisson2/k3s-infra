---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nginx-nfs-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.1.203
    path: /mnt/pve/cephfs/k3s/nginx-web
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-pvc
  namespace: cloudflare-test
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: nginx-nfs-pv
  resources:
    requests:
      storage: 10Gi
