apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fpoisson2/k3s-infra
    targetRevision: main
    path: k8s/
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare-test
  syncPolicy:
    automated:
      prune: true      # Supprime les ressources retirées de Git
      selfHeal: true   # Recrée ce qui est supprimé accidentellement
    syncOptions:
      - CreateNamespace=true
